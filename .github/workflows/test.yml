name: Test

on:
  push:
    branches: [main, develop]
  # Run CI on stacked PRs too. `pull_request.branches` filters by base branch,
  # so limiting it to main/develop skips PRs targeting intermediate stack branches.
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Linux GUI test deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1

      - name: Run tests
        run: uv run --group dev pytest --tb=short -q
